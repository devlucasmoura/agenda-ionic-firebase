<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Meus Contatos</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="carregar()">
        <ion-icon slot="icon-only" name="refresh"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="carregar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div *ngIf="carregando" class="ion-text-center ion-padding">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Carregando...</p>
  </div>

  <ion-list *ngIf="!carregando">
    <ion-item *ngIf="contatos.length === 0" lines="none">
      <ion-label class="ion-text-center ion-padding">
        <p>Nenhum contato salvo ainda.</p>
        <p>Vá em "Usuários" e adicione, ou toque no botão "+"</p>
      </ion-label>
    </ion-item>

    <ion-item-sliding *ngFor="let c of contatos">
      <ion-item>
        <ion-avatar slot="start" *ngIf="c.foto">
          <img [src]="c.foto" alt="foto" />
        </ion-avatar>
        <ion-label>
          <h2>{{ c.nome }}</h2>
          <p>{{ c.email }}</p>
          <p>{{ c.telefone }}</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="abrirFormulario(c)">
          <ion-icon slot="icon-only" name="create"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="confirmarExclusao(c)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="abrirFormulario()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
